name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx ng build ngx-core-components

      - name: Build demo (production, GitHub Pages base href)
        run: npx ng build demo --configuration production --base-href /ngx-core-components/

      - name: Copy index.html → 404.html (SPA deep-link fallback)
        run: cp dist/demo/browser/index.html dist/demo/browser/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/demo/browser
          force_orphan: true
