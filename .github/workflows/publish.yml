name: Publish Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main # FIX 1: Explicitly check out the branch, not the detached commit

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Workspace Dependencies
        run: npm ci

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version in Library
        # FIX 2: Manually handle the commit so NPM doesn't get confused by the sub-folder
        run: |
          cd projects/ngx-core-components
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          cd ../..
          git add projects/ngx-core-components/package.json
          git commit -m "chore: release version $VERSION [skip ci]"
          git tag "v$VERSION"

      - name: Build the Angular Library
        run: npx ng build ngx-core-components

      - name: Publish to npm
        run: |
          cd dist/ngx-core-components
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Update back to GitHub
        # FIX 3: Push the exact HEAD to the remote main branch
        run: git push origin HEAD:main --follow-tags
