name: Publish Package

on:
  push:
    branches:
      - main

# Explicitly grant the GitHub Action permission to push the version bump back to the repo
permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to push version tags back to the repository

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Workspace Dependencies
        run: npm ci

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version in Library
        # Navigates to your library folder and bumps the patch version (e.g., 0.0.5 -> 0.0.6)
        # The [skip ci] tag is CRITICAL: it prevents this commit from triggering an infinite loop of workflows
        run: |
          cd projects/ngx-core-components
          npm version patch -m "chore: release version %s [skip ci]"

      - name: Build the Angular Library
        run: npx ng build ngx-core-components

      - name: Publish to npm
        # Navigates to the compiled output folder and publishes to npm
        run: |
          cd dist/ngx-core-components
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push Version Update back to GitHub
        # Pushes the newly created version commit and tag back to your main branch
        run: git push origin main --follow-tags