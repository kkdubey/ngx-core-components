name: Publish Package

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16' # specify your node version

      - name: Bump version and publish
        run: |
          npm install -g npm-check-updates
          ncu -u
          npm install
          npm run build
          npm publish
